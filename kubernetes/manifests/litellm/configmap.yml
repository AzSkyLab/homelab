---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      # VM - RTX 3090 (24GB) — explicit models with vm/ prefix
      - model_name: "vm/qwen3-coder:30b"
        litellm_params:
          model: "ollama/qwen3-coder:30b"
          api_base: "http://10.0.20.30:11434"
      - model_name: "vm/deepseek-r1:32b"
        litellm_params:
          model: "ollama/deepseek-r1:32b"
          api_base: "http://10.0.20.30:11434"
      - model_name: "vm/gemma4:26b"
        litellm_params:
          model: "ollama/gemma4:26b-a4b-it-q4_K_M"
          api_base: "http://10.0.20.30:11434"
      # Workstation - RTX 5090 (32GB) — explicit models with ws/ prefix
      - model_name: "ws/qwen3-coder:30b"
        litellm_params:
          model: "ollama/qwen3-coder:30b"
          api_base: "http://10.0.10.40:11434"
      - model_name: "ws/deepseek-r1:32b"
        litellm_params:
          model: "ollama/deepseek-r1:32b"
          api_base: "http://10.0.10.40:11434"
      - model_name: "ws/gemma4:26b"
        litellm_params:
          model: "ollama/gemma4:26b-a4b-it-q4_K_M"
          api_base: "http://10.0.10.40:11434"
      # Load-balanced — same model_name with multiple backends for round-robin
      - model_name: "ollama/qwen3-coder:30b"
        litellm_params:
          model: "ollama/qwen3-coder:30b"
          api_base: "http://10.0.20.30:11434"
      - model_name: "ollama/qwen3-coder:30b"
        litellm_params:
          model: "ollama/qwen3-coder:30b"
          api_base: "http://10.0.10.40:11434"
      - model_name: "ollama/deepseek-r1:32b"
        litellm_params:
          model: "ollama/deepseek-r1:32b"
          api_base: "http://10.0.20.30:11434"
      - model_name: "ollama/deepseek-r1:32b"
        litellm_params:
          model: "ollama/deepseek-r1:32b"
          api_base: "http://10.0.10.40:11434"
      - model_name: "ollama/gemma4:26b"
        litellm_params:
          model: "ollama/gemma4:26b-a4b-it-q4_K_M"
          api_base: "http://10.0.20.30:11434"
      - model_name: "ollama/gemma4:26b"
        litellm_params:
          model: "ollama/gemma4:26b-a4b-it-q4_K_M"
          api_base: "http://10.0.10.40:11434"

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
