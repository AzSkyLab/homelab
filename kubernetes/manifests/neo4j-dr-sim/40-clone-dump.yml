---
# THE CORE CONCEPT: dump from a CLONE of a snapshot — production never stops.
# Orchestrator (CronJob) -> clone PVC from newest ready VolumeSnapshot -> worker pod:
#   1. start Neo4j on the clone (= crash recovery, tx-log replay)
#   2. sanity count, clean stop (SIGTERM = final checkpoint)
#   3. neo4j-admin database check + dump system+neo4j
#   4. upload to "east" MinIO + latest-verified marker
# A snapshot that fails recovery fails the Job loudly; prod is unaffected.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: neo4j-backup
  namespace: neo4j-eastus2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: neo4j-backup
  namespace: neo4j-eastus2
rules:
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: neo4j-backup
  namespace: neo4j-eastus2
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: neo4j-backup
subjects:
  - kind: ServiceAccount
    name: neo4j-backup
    namespace: neo4j-eastus2
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: neo4j-backup-scripts
  namespace: neo4j-eastus2
data:
  backup.sh: |
    #!/bin/sh
    set -e
    NS=neo4j-eastus2
    TS=$(date +%Y%m%d-%H%M%S)
    SNAP=$(kubectl get volumesnapshot -n $NS -l app=neo4j -o json | \
      jq -r '[.items[] | select(.status.readyToUse==true)] | sort_by(.metadata.creationTimestamp) | last | .metadata.name')
    if [ -z "$SNAP" ] || [ "$SNAP" = "null" ]; then echo "no ready snapshot found"; exit 1; fi
    echo "cloning from snapshot $SNAP as backup $TS"
    cat <<EOF | kubectl apply -f -
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: neo4j-clone-$TS
      namespace: $NS
      labels: {app: neo4j-backup-clone}
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: longhorn
      dataSource:
        name: $SNAP
        kind: VolumeSnapshot
        apiGroup: snapshot.storage.k8s.io
      resources:
        requests:
          storage: 2Gi
    EOF
    sed -e "s/__TS__/$TS/g" /scripts/worker-pod.yaml | kubectl apply -f -
    PHASE=""
    i=0
    while [ $i -lt 240 ]; do
      PHASE=$(kubectl get pod backup-worker-$TS -n $NS -o jsonpath='{.status.phase}' 2>/dev/null || echo Pending)
      [ "$PHASE" = "Succeeded" ] && break
      if [ "$PHASE" = "Failed" ]; then break; fi
      sleep 10; i=$((i+1))
    done
    kubectl logs backup-worker-$TS -n $NS --all-containers=true --prefix || true
    if [ "$PHASE" != "Succeeded" ]; then
      echo "worker phase=$PHASE — leaving pod and clone PVC in place for debugging"
      exit 1
    fi
    kubectl delete pod backup-worker-$TS -n $NS
    kubectl delete pvc neo4j-clone-$TS -n $NS
    echo "backup $TS complete and uploaded"
  worker-pod.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: backup-worker-__TS__
      namespace: neo4j-eastus2
      labels: {app: neo4j-backup-worker}
    spec:
      restartPolicy: Never
      enableServiceLinks: false
      volumes:
        - name: clone
          persistentVolumeClaim:
            claimName: neo4j-clone-__TS__
        - name: backup
          emptyDir: {}
      initContainers:
        - name: recover-dump
          image: neo4j:5.26.28-community
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              export NEO4J_server_memory_heap_max__size=512m
              export NEO4J_server_memory_pagecache_size=256m
              /startup/docker-entrypoint.sh neo4j &
              PID=$!
              READY=no
              for i in $(seq 1 60); do
                if cypher-shell -u neo4j -p 'neo4jdemo-2026' "RETURN 1;" >/dev/null 2>&1; then READY=yes; break; fi
                sleep 5
              done
              [ "$READY" = "yes" ] || { echo "RECOVERY FAILED — snapshot did not come up"; exit 1; }
              echo "crash recovery OK; node count on clone:"
              cypher-shell -u neo4j -p 'neo4jdemo-2026' --format plain "MATCH (n) RETURN count(n);"
              kill -TERM $PID
              wait $PID || true
              echo "clean shutdown done; checking + dumping"
              neo4j-admin database check neo4j
              neo4j-admin database dump neo4j --to-path=/backup
              neo4j-admin database dump system --to-path=/backup
              ls -la /backup
          volumeMounts:
            - {name: clone, mountPath: /data}
            - {name: backup, mountPath: /backup}
          resources:
            requests: {cpu: 250m, memory: 1Gi}
            limits: {cpu: "1", memory: 1536Mi}
        - name: upload
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mc alias set east http://minio.neo4j-eastus2.svc.cluster.local:9000 minioadmin minioadmin123
              mc cp --recursive /backup/ east/dumps/prod/__TS__/
              printf 'verified %s' "__TS__" | mc pipe east/dumps/prod/__TS__/latest-verified
              mc ls east/dumps/prod/__TS__/
          volumeMounts:
            - {name: backup, mountPath: /backup}
      containers:
        - name: done
          image: busybox:1.36
          command: ["sh", "-c", "echo backup __TS__ uploaded"]
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: neo4j-clone-dump
  namespace: neo4j-eastus2
spec:
  schedule: "30 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: neo4j-backup
          restartPolicy: Never
          volumes:
            - name: scripts
              configMap:
                name: neo4j-backup-scripts
                defaultMode: 0755
          containers:
            - name: orchestrate
              image: alpine/k8s:1.33.4
              command: ["/bin/sh", "/scripts/backup.sh"]
              volumeMounts:
                - {name: scripts, mountPath: /scripts}
