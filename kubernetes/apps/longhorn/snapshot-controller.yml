---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snapshot-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infrastructure
  source:
    repoURL: https://piraeus.io/helm-charts
    chart: snapshot-controller
    targetRevision: "5.1.1"
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  # The conversion webhook rotates its cert Secret and injects caBundle into the
  # snapshot CRDs at runtime — without these ignores the app is perpetually
  # OutOfSync and selfHeal fights the webhook.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion/webhook/clientConfig/caBundle
    - kind: Secret
      name: snapshot-controller-conversion-webhook
      jsonPointers:
        - /data
